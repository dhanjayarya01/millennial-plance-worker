spring.application.name=millennial-plance-worker
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:millennial_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:millennial}
spring.datasource.password=${MYSQL_PASSWORD:millennial_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Bound Config Properties
app.worker.redis.host=${REDIS_HOST:localhost}
app.worker.redis.port=${REDIS_PORT:6379}
app.worker.redis.password=${REDIS_PASSWORD:}

app.worker.smtp.host=${SMTP_HOST:localhost}
app.worker.smtp.port=${SMTP_PORT:587}
app.worker.smtp.username=${SMTP_USER:}
app.worker.smtp.password=${SMTP_PASS:}
app.worker.smtp.from=${SMTP_FROM:no-reply@millennial.com}

app.worker.resend.api-key=${RESEND_API_KEY:}
app.worker.resend.from=${EMAIL_FROM:GetPlaced <noreply@getplaced.tech>}
